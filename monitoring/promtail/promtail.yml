# Promtail configuration
# Tails the Traefik JSON access log and ships entries to Loki.
# The pipeline keeps HTTP status as a low-cardinality label;
# all other fields (ClientHost, RequestPath, User-Agent, …) are left in the log
# line and parsed at query time via Loki's | json pipeline stage.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: traefik-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik-access
          __path__: /var/log/traefik/access.log
    pipeline_stages:
      # Parse the JSON access log to extract the HTTP status code as a label.
      # All other high-cardinality fields are kept in the raw log line so they
      # can be aggregated in Loki queries with | json without inflating the index.
      - json:
          expressions:
            status: DownstreamStatus
      - labels:
          status:

  # ModSecurity WAF audit log — collected from the container's stdout via the Docker
  # socket proxy.  ModSecurity writes one JSON object per audit event to stdout
  # (MODSEC_AUDIT_LOG_FORMAT=JSON); Promtail streams it through the proxy TCP endpoint
  # so no named volume, entrypoint override, or root privileges are required.
  # The http_code label enables efficient stream selection so dashboard queries can
  # filter for blocked (403) vs. inspected-but-passed requests without scanning every
  # log line.
  - job_name: modsec-audit
    docker_sd_configs:
      - host: tcp://docker-socket-proxy:2375
        refresh_interval: 5s
        filters:
          - name: name
            values: ["meshcentral-modsecurity-waf"]
    relabel_configs:
      - target_label: job
        replacement: modsec-audit
    pipeline_stages:
      # Extract the HTTP response code from the nested JSON structure.
      # Step 1: pull the top-level "transaction" object into the extracted map.
      - json:
          expressions:
            txn: transaction
      # Step 2: pull "response" out of the transaction object.
      - json:
          source: txn
          expressions:
            rsp: response
      # Step 3: extract the numeric http_code from the response object.
      - json:
          source: rsp
          expressions:
            http_code: http_code
      # Promote http_code to a Loki label for stream selection.
      # All other fields (client_ip, uri, rule messages) stay in the raw log line
      # for query-time extraction via | json to keep label cardinality low.
      - labels:
          http_code:
